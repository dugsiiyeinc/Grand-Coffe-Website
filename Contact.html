<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Contact</title>
    <link rel="stylesheet" href="Contact.css">
</head>
<body>

           <!-- Contact us -->
            <section class="Contact">

                <h1>Contact us</h1>

                <div class="Contact-section"> 

                <div class="back-form">
                    <form action="#method" class="Contact-form">
                        <input type="text" class="input" placeholder="Name">
                        <input type="Email" class="input" placeholder="Email">
                        <input type="text" class="input" placeholder="Phone Number">
                        <textarea name="Message" id="form-message" class="Area-form" placeholder="Massage"></textarea>
                    </form>
                    <button class="btn">SEND</button>
                </div>

                <!-- location -->
                <div class="Map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2624.9916246075636!2d2.2944812999999997!3d48.858370099999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e2964e34e2d%3A0x8ddca9ee380ef7e0!2sEiffel%20Tower!5e0!3m2!1sen!2sso!4v1775492470313!5m2!1sen!2sso" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

                </div> 

            </section>
    
</body>
</html>
